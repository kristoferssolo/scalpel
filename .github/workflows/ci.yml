name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check:
    # Pinned: windows-latest rotated to an image where node-gyp can't locate
    # Visual Studio to rebuild active-win. windows-2022 has the working toolchain.
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Python setuptools (needed by node-gyp)
        run: pip install setuptools

      - name: Install dependencies
        run: npm ci

      - name: Validate premium-mods schema
        run: npm run validate:premium-mods -- --require-verified

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Typecheck
        run: npm run build:i18n && npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
