name: Refresh tier data

on:
  schedule:
    - cron: '17 6 * * *' # daily 06:17 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Regenerate tier data (ETag-gated)
        run: node scripts/build-tier-data.js

      - name: Open PR if data changed
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'chore: refresh tier data from RePoE-fork'
          title: 'chore: refresh tier data'
          body: 'Automated daily refresh of src/shared/data/tiers from RePoE-fork. No-op runs (unchanged ETags) produce no diff and no PR.'
          branch: bot/refresh-tier-data
          add-paths: src/shared/data/tiers/
